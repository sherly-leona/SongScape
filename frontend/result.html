<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        Songscape | Music Identity
    </title>
    <link rel="stylesheet" href="./rstyle.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&display=swap" rel="stylesheet">
</head>
<body class="result-page">
    <section id="enterScreen">
        <div class="enter-content">
            <p class="enter-label">
                YOUR WORLD HAS BEEN GENERATED
            </p>
            <h1 id="enterIdentity">
                SONGSCAPE
            </h1>
            <button id="enterWorldButton">
                ENTER YOUR WORLD →
            </button>
        </div>
    </section>
    <main
        class="result-container hidden-result"
        id="resultContainer">
        <header class="result-header">
            <p class="result-number">
                S / 001
            </p>
            <div class="result-brand">
                <h1>
                    SONGSCAPE
                </h1>
                <p>
                    MUSIC IDENTITY
                </p>
            </div>
        </header>
        <section class="identity-result">
            <div class="vinyl-area">
                <img
                    src="./assets/vinyl.png"
                    alt="Vinyl record"
                    class="vinyl-record"
                    id="vinylRecord"
                >
            </div>
            <div class="identity-info">
                <h2 id="identityTitle">
                    THE<br>
                    MIDNIGHT<br>
                    DREAMER
                </h2>
                <div class="result-artists">
                    <p id="resultArtist1">
                        ARTIST 01
                    </p>
                    <p id="resultArtist2">
                        ARTIST 02
                    </p>
                    <p id="resultArtist3">
                        ARTIST 03
                    </p>
                </div>
            </div>
        </section>
        <hr class="result-line">
        <section class="composition-section">
            <h3>
                YOUR MUSICAL COMPOSITION
            </h3>
            <div id="compositionList">
                <div class="composition-row">
                    <span>01</span>
                    <span id="mood1">
                        MELANCHOLIC
                    </span>
                    <span id="percentage1">
                        33
                    </span>
                </div>
                <div class="composition-row">
                    <span>02</span>
                    <span id="mood2">
                        BRIGHT
                    </span>
                    <span id="percentage2">
                        33
                    </span>
                </div>
                <div class="composition-row">
                    <span>03</span>
                    <span id="mood3">
                        DREAMY
                    </span>
                    <span id="percentage3">
                        17
                    </span>
                </div>
                <div class="composition-row">
                    <span>04</span>
                    <span id="mood4">
                        WARM
                    </span>
                    <span id="percentage4">
                        17
                    </span>
                </div>
            </div>
        </section>
        <section class="world-section">
            <h3>
                YOUR WORLD IS MADE OF
            </h3>
            <div class="world-elements">
                <div class="world-item">
                    <span class="world-symbol">
                        ☾
                    </span>
                    <p id="worldName1">
                        MOONLIGHT
                    </p>
                    <small id="worldMood1">
                        DREAMY
                    </small>
                </div>
                <div class="world-item">
                    <span class="world-symbol">
                        ○
                    </span>
                    <p id="worldName2">
                        HAZE
                    </p>
                    <small id="worldMood2">
                        MELANCHOLIC
                    </small>
                </div>
                <div class="world-item">
                    <span class="world-symbol">
                        ✦
                    </span>
                    <p id="worldName3">
                        STATIC
                    </p>
                    <small id="worldMood3">
                        BRIGHT
                    </small>
                </div>
            </div>
        </section>
    </main>
    <audio
        id="worldAudio"
        loop>
    </audio>
    <script src="./result.js"></script>
</body>
</html>
